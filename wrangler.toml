name = "nuxt-ichibanboshi-seikyu"
account_id = "24b45709d060d957340180e995f0d373"
main = "./.output/server/index.mjs"
compatibility_date = "2025-07-15"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".output/public"

# Workers Logs を有効化 (proxy の上流 status 等を observability で確認するため)。
[observability]
enabled = true

# 軽油価格 自動取込 cron。水曜 14:05/14:15/14:25 JST (= UTC 05:05/05:15/05:25)。
# nuxt.config の nitro.scheduledTasks と同式。公表直後に最大 3 回叩き、新ファイルが
# 出た 1 回だけ取込 + LINE WORKS 通知 (取得後不要 = diesel_import_state の dedup)。
[triggers]
crons = ["5,15,25 5 * * 3"]

# single-env (staging = prod)。PR を上げると CI がこの live worker に deploy する。
[[routes]]
pattern = "ichibanboshi-seikyu.ippoan.org"
custom_domain = true

[vars]
# tenant 制限 (大石運輸倉庫のみ) は auth-worker 側 (APP_TENANT_ACL) に集約。
# worker は tenant_id を持たない。
NUXT_PUBLIC_AUTH_WORKER_URL = "https://auth.ippoan.org"

# 一番星 (rust-ichibanboshi) 連携 — 燃費マスタの車種ドロップダウンを
# GET /api/vehicles (車種ﾏｽﾀ) で取得する。rust-ichiban.mtamaramu.com は
# Cloudflare Access (Service Token) 保護なので CF-Access-Client-Id/Secret を付けて呼ぶ
# (nuxt-ichibanboshi と同方式)。
# service token `rust-ichibanboshi-ci-deploy` (824a8b3c) を使う。GCP に保管された
# CF_ACCESS_CLIENT_ID/SECRET のペアがこのトークンで、rust-ichiban の CF Access app の
# Service Auth 許可リストにも登録済 (nuxt-ichibanboshi も同トークンに寄せる)。
# CF_ACCESS_CLIENT_ID は公開識別子なので plain var、secret は下の binding。
ICHIBAN_API_BASE = "https://rust-ichiban.mtamaramu.com"
CF_ACCESS_CLIENT_ID = "824a8b3c7042c7040924f38797a832f7.access"

# 軽油価格 自動取込 cron 完了後の LINE WORKS bot 通知 (Refs #11 #2)。
# bot_id / client_id / service_account / 送信先は識別子なので plain var、
# client_secret と private_key (PKCS#8 PEM) は下の Secrets Store binding。
# どれか欠けると通知は無効 (= 取込は成功扱いを保つ)。未設定でも cron / 取込は動く。
# 値投入後にこの var を埋める (空文字なら通知 skip)。
LINEWORKS_BOT_ID = ""
LINEWORKS_CLIENT_ID = ""
LINEWORKS_SERVICE_ACCOUNT = ""
LINEWORKS_TARGET_TYPE = "channel"   # channel (トークルーム) | user
LINEWORKS_TARGET_ID = ""

# auth-worker POST /auth/introspect (ippoan/auth-worker#290) を叩くための共有 secret。
# 本 worker は HS256 署名鍵 (JWT_SECRET) を持たず、INTERNAL_SHARED_SECRET で
# introspect を認証する (auth-worker が resolveAllSharedSecrets で受理、#189)。
# auth-worker / cc-relay broker / ref-files 等と同じ CF Secrets Store entry を
# 物理共有。GCP cloudsql-sv に同名 secret が SoT として存在する (secret-verify が検証)。
#
# secrets_store_secrets を宣言すると frontend-ci の secret-verify が必須化するため、
# test.yml で gcp_secret_verify_* を配線 + ohishi-exp に GCP WIF を許可する
# (PR 本文の runbook 参照)。
[[secrets_store_secrets]]
binding = "INTERNAL_SHARED_SECRET"
store_id = "bd7bc91a3e5f4111add4acf6cb4b8733"
secret_name = "INTERNAL_SHARED_SECRET"

# 一番星 CF Access service token (rust-ichibanboshi-ci-deploy / 824a8b3c) の client_secret。
# GCP cloudsql-sv の同名 secret を SoT とし、CF Secrets Store へ sync 済
# (secrets-inventory sync_from_gcp、secret_id 13965df3...)。secret-verify が GCP で検証する。
# CF_ACCESS_CLIENT_ID (上の var) とペアになる値。
[[secrets_store_secrets]]
binding = "CF_ACCESS_CLIENT_SECRET"
store_id = "bd7bc91a3e5f4111add4acf6cb4b8733"
secret_name = "CF_ACCESS_CLIENT_SECRET"

# --- LINE WORKS bot 通知 (cron 完了通知、Refs #11 #2) ---
# bot を provisioning し、GCP cloudsql-sv + CF Secrets Store に下記 2 secret を
# 投入してから (secret-inject skill)、以下の 2 binding を有効化する。
# 先に宣言すると secret-verify が GCP に無い secret を見て CI fail するため、
# provisioning 完了まではコメントアウトしておく (通知コードは binding 不在で自動 skip)。
# [[secrets_store_secrets]]
# binding = "LINEWORKS_CLIENT_SECRET"
# store_id = "bd7bc91a3e5f4111add4acf6cb4b8733"
# secret_name = "LINEWORKS_CLIENT_SECRET"
#
# [[secrets_store_secrets]]
# binding = "LINEWORKS_PRIVATE_KEY"            # PKCS#8 PEM (PKCS#1 は convert_secret_pkcs8 で変換)
# store_id = "bd7bc91a3e5f4111add4acf6cb4b8733"
# secret_name = "LINEWORKS_PRIVATE_KEY"

# 県庁間距離マスタ等の D1 (距離制サーチャージ)。Refs #11
# データ投入は seed migration ではなく Excel→CSV upload (= 画面の CSV アップロード)。
# スキーマ適用: npx wrangler d1 migrations apply nuxt-ichibanboshi-seikyu --remote
[[d1_databases]]
binding = "DB"
database_name = "nuxt-ichibanboshi-seikyu"
database_id = "d877b3b6-eb9d-4c41-b2b3-20ba1917aaaa"
migrations_dir = "migrations"
