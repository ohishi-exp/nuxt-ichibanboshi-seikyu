name: skills-check

# <repo>-map skill が構造変化に追従しているか PR diff で検査する
# (ci-workflows#118 / claude-skills#59 Wave 3)。enforce=warn (default)。
# map-check + dependency-check (新規依存 vs knowledge/standards/libs) が走る。
# 本 repo はまだ map skill が無いので map-check は uncovered を 1 行通知するだけ。

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  skills-check:
    uses: ippoan/ci-workflows/.github/workflows/skills-check.yml@main
