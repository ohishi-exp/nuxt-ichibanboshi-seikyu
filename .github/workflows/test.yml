name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

# frontend-ci.yml は内蔵 secret-verify が parse 時に id-token: write を要求するため
# skip される run でも宣言必須 (Option A: top-level)。
permissions:
  contents: write
  pull-requests: write
  packages: read
  id-token: write

jobs:
  ci:
    uses: ippoan/ci-workflows/.github/workflows/frontend-ci.yml@main
    with:
      project_type: 'nuxt'
      # @ippoan/auth-client は GitHub Packages publish が version gate (auth-worker
      # v* tag)。lockfile が旧版を pin していても manifest に追従させる + CCoW から
      # lockfile を再生成できないため npm install を明示。
      install_command: 'npm install'
      post_install_script: 'npx nuxt prepare'
      use_auth_client_dev: true
      # single-env (staging = prod): staging / release とも同一 wrangler.toml を deploy。
      deploy_staging_script: 'npm run build && npx wrangler deploy'
      deploy_release_script: 'npm run build && npx wrangler deploy'
      # wrangler.toml が secrets_store_secrets (JWT_SECRET) を宣言したので secret-verify
      # が必須。GCP cloudsql-sv の同名 secret を WIF で検証する。値は org/repo vars
      # から (PR 本文 runbook 参照: ohishi-exp に WIF 許可 + これら vars を設定)。
      gcp_secret_verify_project: ${{ vars.GCP_PROJECT_ID_STAGING }}
      gcp_secret_verify_provider: ${{ vars.GCP_WIF_PROVIDER }}
      gcp_secret_verify_sa: ${{ vars.GCP_WIF_SERVICE_ACCOUNT_STAGING }}
    # cross-org caller (ohishi-exp → ippoan/ci-workflows) は secrets: inherit が
    # 効かないため明示渡し (Refs ippoan/ci-workflows#125)。
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CI_APP_ID: ${{ secrets.CI_APP_ID }}
      CI_APP_PRIVATE_KEY: ${{ secrets.CI_APP_PRIVATE_KEY }}
      TAG_RELEASE_PAT: ${{ secrets.TAG_RELEASE_PAT }}
